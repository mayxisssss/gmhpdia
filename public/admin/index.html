<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta http-equiv="Cache-Control" content="no-store">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área Administrativa | Gama Hospital Dia</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <section class="login-screen" data-login-screen>
    <form class="login-card" data-login-form>
      <img class="login-logo" src="../assets/logo/logo-simbolo.png" alt="Gama Hospital Dia">
      <h1>Área Administrativa</h1>
      <p class="muted" style="text-align:center;margin:8px 0 0;">Entre para adicionar, editar e remover conteúdos do site.</p>
      <div class="form-row"><label>Usuário</label><input class="input" name="usuario" placeholder="Usuário" required></div>
      <div class="form-row"><label>Senha</label><input class="input" name="senha" type="password" placeholder="Digite a senha" required></div>
      <button class="btn btn-primary" style="width:100%;margin-top:20px;" type="submit">Entrar</button>
      
    </form>
  </section>

  <section class="admin-app hidden" data-admin-app>
    <aside class="sidebar">
      <div class="side-brand"><img src="../assets/logo/logo-simbolo.png" alt=""><div><strong>Gama Hospital Dia</strong><div class="muted">Painel ADM</div></div></div>
      <nav class="nav" data-admin-nav></nav>
      <div class="side-actions">
        <a class="btn btn-outline" href="../index.html" target="_blank">Ver site</a>
        <button class="btn btn-outline" type="button" data-logout>Sair</button>
      </div>
    </aside>
    <main class="main">
      <div class="topbar"><div><h1 data-module-title>Dashboard</h1><p class="muted" data-module-desc>Gerencie o conteúdo do site.</p></div><button class="btn btn-primary hidden" data-add-btn type="button">Adicionar</button></div>
      <div data-admin-content></div>
    </main>
  </section>

  <div class="toast" data-toast>Salvo</div>
  <script src="../js/data.js?v=6.0"></script>
  <script src="admin.js"></script>
</body>
</html>
